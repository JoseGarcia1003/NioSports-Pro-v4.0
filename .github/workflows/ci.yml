name: CI — NioSports Pro

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint --if-present

      - name: Svelte check
        run: npm run check --if-present

      - name: Run tests
        run: npm run test:unit -- --reporter=verbose
        env:
          VITE_SUPABASE_URL: https://fake.supabase.co
          VITE_SUPABASE_ANON_KEY: fake-key-for-ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://fake.supabase.co
          VITE_SUPABASE_ANON_KEY: fake-key-for-ci
          PUBLIC_FIREBASE_API_KEY: fake
          PUBLIC_FIREBASE_AUTH_DOMAIN: fake.firebaseapp.com
          PUBLIC_FIREBASE_DATABASE_URL: https://fake.firebaseio.com
          PUBLIC_FIREBASE_PROJECT_ID: fake
          PUBLIC_FIREBASE_STORAGE_BUCKET: fake.appspot.com
          PUBLIC_FIREBASE_MESSAGING_SENDER_ID: 000000
          PUBLIC_FIREBASE_APP_ID: fake

      - name: Security audit
        run: npm audit --audit-level=moderate || true